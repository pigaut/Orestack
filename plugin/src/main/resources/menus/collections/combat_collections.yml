--- # ==== Blaze Rod Button ===== #
id: a
condition: hasUnlockedCollection blaze_rod
met:
  type: blaze_rod
  name: '&eBlaze Rod {blaze_rod_collection_current_tier_rm}'
  lore:
    - '&7View all your Blaze Rod Collection'
    - '&7progress and rewards!'
    -
    - '&7Progress to Blaze Rod {blaze_rod_collection_next_tier_rm}: &e{blaze_rod_collection_progress_percent}&6%'
    - '{blaze_rod_collection_progress_bar:line} &e{blaze_rod_collection_progress}/{blaze_rod_collection_tier_up_requirement}'
    -
    - '&eClick to view!'
  on-left-click:
    - openMenu collection_progress collection=blaze_rod

unmet:
  type: gray dye
  name: '&cBlaze Rod'
  lore:
    - '&7Find this item to add it to your'
    - '&7collection and unlock collection'
    - '&7rewards!'
  on-left-click:
    - sendChat &4You haven't found this item yet!

