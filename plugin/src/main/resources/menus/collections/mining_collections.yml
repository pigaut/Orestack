--- # ==== Dirt Button ===== #
id: a
condition: hasUnlockedCollection dirt
met:
  type: dirt
  name: '&eDirt {dirt_collection_current_tier_rm}'
  lore:
    - '&7View all your Dirt Collection'
    - '&7progress and rewards!'
    -
    - '&7Progress to Dirt {dirt_collection_next_tier_rm}: &e{dirt_collection_progress_percent}&6%'
    - '{dirt_collection_progress_bar:line} &e{dirt_collection_progress}/{dirt_collection_tier_up_requirement}'
    -
    - '&eClick to view!'
  on-left-click:
    - openMenu collection_progress collection=dirt

unmet:
  type: gray dye
  name: '&cDirt'
  lore:
    - '&7Find this item to add it to your'
    - '&7collection and unlock collection'
    - '&7rewards!'
  on-left-click:
    - sendChat &4You haven't found this item yet!

