--- # ==== Beetroot Button ===== #
id: a
condition: hasUnlockedCollection beetroot
met:
  type: beetroot
  name: '&eBeetroot {beetroot_collection_tier_rm}'
  lore:
    - '&7View all your Beetroot Collection'
    - '&7progress and rewards!'
    -
    - '&7Progress to Beetroot {beetroot_collection_next_tier_rm}: &e{beetroot_collection_progress_percent}&6%'
    - '{beetroot_collection_progress_bar:line} &e{beetroot_collection_progress}/{beetroot_collection_tier_up_requirement}'
    -
    - '&eClick to view!'
  on-left-click:
    - openMenu collection_progress collection=beetroot

unmet:
  type: gray dye
  name: '&cBeetroot'
  lore:
    - '&7Find this item to add it to your'
    - '&7collection and unlock collection'
    - '&7rewards!'
  on-left-click:
    - sendChat &4You haven't found this item yet!

