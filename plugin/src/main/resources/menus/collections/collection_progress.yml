--- #===== Tier 18 Button =====#
id: 18
conditional-buttons:
  - condition: collectionMaxTierEquals 17-
    type: gray_stained_glass_pane
    name: ''

  - condition: collectionIsUnlocked
    type: green_stained_glass_pane
    name: '&a{collection_name_tc} XVIII'
    lore:
      - ''
      - '&7Progress: &e{collection_progress_percent}%'
      - '{collection_tier_18_progress_bar} &e{collection_progress}&6/&e{collection_tier_18_requirement}'
      - ''
      - '&7Rewards:'
      - '  {collection_rewards}'

  - condition: collectionTierEquals 18
    type: yellow_stained_glass_pane
    name: '&e{collection_name_tc} XVIII'
    lore:
      - ''
      - '&7Progress: &e{collection_progress_percent}%'
      - '{collection_tier_18_progress_bar} &e{collection_progress}&6/&e{collection_tier_18_requirement}'
      - ''
      - '&7Rewards:'
      - '  {collection_rewards}'

