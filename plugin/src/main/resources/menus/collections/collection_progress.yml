# Progress and rewards for any item collection. Supports up to 18 collection tiers.
# Usage: openMenu collection_progress collection=dirt

title: '&8{collection_name} Collection'

rows: 6

layout:
  - 8 8 8 8 t 8 8 8 8
  - 8 8 8 8 8 8 8 8 8
  - a b c d e f g h i
  - j k l m n o p q r
  - 8 8 8 8 8 8 8 8 8
  - 8 8 8 < X = 8 8 8

--- #===== Collection Item =====#
id: t
type: '{collection_item}'
name: '&e{collection_name_tc} {collection_tier_rm}'
lore:
  - 'View all your {collection_name_tc} Collection'
  - 'progress and rewards!'
  - ''
  - 'Total Collected: &e{collection_progress}'

--- #===== Tier 1 =====#
id: a
conditional-buttons:
  - if: collectionTierEquals 0
    type: yellow_stained_glass_pane
    amount: 1
    name: '&e{collection_name_tc} I'
    lore:
      - ''
      - 'Progress: &e{collection_tier_1_progress_percent}%'
      - '{collection_tier_1_progress_bar} &e{collection_progress}&6/&e{collection_tier_1_requirement}'
      - ''
      - 'Rewards:'
      - '  {collection_tier_1_rewards}'
  - if: collectionTierIsCompleted 1
    type: lime_stained_glass_pane
    amount: 1
    name: '&a{collection_name_tc} I'
    lore:
      - ''
      - 'Progress: &e{collection_tier_1_progress_percent}%'
      - '{collection_tier_1_progress_bar} &e{collection_progress}&6/&e{collection_tier_1_requirement}'
      - ''
      - 'Rewards:'
      - '  {collection_tier_1_rewards}'

default-button:
  type: red_stained_glass_pane
  amount: 1
  name: '&c{collection_name_tc} I'
  lore:
    - ''
    - '&7Progress: &e{collection_tier_1_progress_percent}%'
    - '{collection_tier_1_progress_bar} &e{collection_progress}&6/&e{collection_tier_1_requirement}'
    - ''
    - '&7Rewards:'
    - '  {collection_tier_1_rewards}'

