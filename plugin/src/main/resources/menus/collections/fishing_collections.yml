--- # ==== Cod Button ===== #
id: a
condition: hasUnlockedCollection cod
met:
  type: cod
  name: '&eCod {cod_collection_current_tier_rm}'
  lore:
    - '&7View all your Cod Collection'
    - '&7progress and rewards!'
    -
    - '&7Progress to Cod {cod_collection_next_tier_rm}: &e{cod_collection_progress_percent}&6%'
    - '{cod_collection_progress_bar:line} &e{cod_collection_progress}/{cod_collection_tier_up_requirement}'
    -
    - '&eClick to view!'
  on-left-click:
    - openMenu collection_progress collection=cod

unmet:
  type: gray dye
  name: '&cCod'
  lore:
    - '&7Find this item to add it to your'
    - '&7collection and unlock collection'
    - '&7rewards!'
  on-left-click:
    - sendChat &4You haven't found this item yet!

