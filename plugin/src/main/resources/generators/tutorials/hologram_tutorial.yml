
--- #===== Phase 1 =====#
type: depleted
growth: 5s
block: bedrock

# Single-Line Hologram
hologram:
  line: '&7&lSingle-Line'
  # The hologram offset from its spawn location
  offset:
    x: 0
    y: 1
    z: 0
  # Set the hologram to a predefined style
  style: default   # config.yml -> hologram-styles.default

--- #===== Phase 2 =====#
type: ripe
growth: 5s
block: cobblestone

# Single-Line Hologram with placeholders
hologram:
  line: '&7&lSingle-Line &7[{phase_timer}]'
  offset: { x: 0, y: 1, z: 0 }
  # Update the hologram every 3 ticks to refresh placeholders
  update: 3
  # Configure the hologram style to match specific needs
  style:
    alignment: center   # Align the hologram to the center

--- #===== Phase 3 =====#
type: ripe
growth: 5s
block: coal_ore

# Multi-Line Hologram with placeholders
hologram:
  lines:
    - '&7&lMulti-Line'
    - '&7Grows in: {phase_timer}'
  update: 3
  offset: { x: 0, y: 1, z: 0 }

--- #===== Phase 4 =====#
type: ripe
growth: 5s
block: iron_ore

# Animated Hologram
hologram:
  # Create an animation using a frame list
  frames:
    - '&8&lIron &7[{phase_timer}]'
    - '&7&lI&8&lron &7[{phase_timer}]'
    - '&8&lI&7&lr&8&lon &7[{phase_timer}]'
    - '&8&lIr&7&lo&8&ln &7[{phase_timer}]'
    - '&8&lIro&7&ln &7[{phase_timer}]'
    - '&8&lIron &7[{phase_timer}]'
    - '&8&lIron &7[{phase_timer}]'

  # Use update to set the speed of the animation
  update: 3
  offset: { y: 1 }

--- #===== Phase 5 =====#
type: ripe
growth: 5s
block: gold_ore

# Item Hologram
hologram:
  item: iron_pickaxe
  offset.y: 1

--- #===== Phase 6 =====#
type: ripe
growth: 5s
block: diamond_ore

# Block Hologram
hologram:
  block: diamond_ore
  offset.y: 1

--- #===== Phase 7 =====#
type: regrown
block: emerald_ore

# Multi Hologram: multiple holograms with different options
hologram:
  # Hologram 1
  - line: "&f-- &2&lSingle-Line &f--"
    offset.y: 1.5

  # Hologram 2
  - frames:
      - '&a<animated!>'
      - '&f<animated!>'
    update: 8
    offset.y: 1.25

  # Hologram 3
  - item: diamond
    offset.y: 1.0
    style:
      scale: 0.5