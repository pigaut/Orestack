
# Message for collecting a collection item for the first time
collection-unlocked:
  - '&e&lCOLLECTION UNLOCKED &e{collection_name_tc}'   # tc: Title Case

# Message for levelling up the first tier of a collection
collection-first-level-up:
  - '&e&l--------------------------------------------'
  - '&6&lCOLLECTION LEVEL UP &e{collection_name_tc} I'
  - ''
  - '  &a&lREWARDS'
  - '    {collection_rewards}' # Each reward takes one line
  - '&e&l--------------------------------------------'

# Message for levelling up the first tier of a collection (no rewards)
collection-first-level-up-no-rewards:
  - '&e&lCOLLECTION LEVEL UP &e{collection_name_tc} I'

# Message for levelling up a collection
collection-level-up:
  - '&6&l--------------------------------------------'
  - '&6&lCOLLECTION LEVEL UP &e{collection_name_tc} &8{collection_previous_tier_rm}&l→&e{collection_tier_rm}' # rm: IV (Roman numerals)
  - ''
  - '  &a&lREWARDS'
  - '   {collection_rewards}'
  - '&6&l--------------------------------------------'

# Message for levelling up a collection (no rewards)
collection-level-up-no-rewards:
  - '&6&lCOLLECTION LEVEL UP &e{collection_name_tc} &8{collection_previous_tier_rm}&l→&e{collection_tier_rm}'  # rm: IV (Roman numerals)
