simple_particle:
  particle: crit                 # The particle type
  amount: 1                       # The number of particles
  offset: { x: 0, y: 0, z: 0 }   # The exact offset where the particle will spawn
  delay: 10                       # The delay after which this particle should spawn
  repeat: 20                # The amount of times this particle should spawn
  interval: 5                    # The interval between each repetition, repetitions must be set for this to work
  range: { x: 1, y: 1, z: 1 }    # The random range in which it will spawn
  player-only: false   # Whether visible to all or just target player, default is false

explosion: explosion_large count=3

rain_cloud:
  # White cloud
  - cloud count=15 offsetY=1.5 rangeX=0.3 rangeZ=0.3 repeat=8 interval=2
  # Falling rain
  - falling_water count=15 offsetY=1.5 rangeX=0.2 rangeZ=0.2 repeat=12 interval=2

magic_circle:
  - enchantment_table count=3 offsetX=1
  - enchantment_table count=3 offsetX=0.707 offsetZ=0.707 delay=3
  - enchantment_table count=3 offsetZ=1 delay=6
  - enchantment_table count=3 offsetX=-0.707 offsetZ=0.707 delay=9
  - enchantment_table count=3 offsetX=-1 delay=12
  - enchantment_table count=3 offsetX=-0.707 offsetZ=-0.707 delay=15
  - enchantment_table count=3 offsetZ=-1 delay=18
  - enchantment_table count=3 offsetX=0.707 offsetZ=-0.707 delay=21

