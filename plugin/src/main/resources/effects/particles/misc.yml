  - { particle: flame, amount: 10, offset: {x: 0, y: 0.2, z: 0} }
  - { particle: lava, amount: 5, offset: {x: 0.3, y: 0.4, z: 0.3}, delay: 2 }
  - { particle: lava, amount: 5, offset: {x: -0.3, y: 0.4, z: -0.3}, delay: 4 }
  - { particle: smoke, amount: 8, offset: {x: 0.2, y: 0.6, z: 0.2}, delay: 6 }