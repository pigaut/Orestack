tool:
  type: iron_pickaxe
  unbreakable: true
  flags: [hide_unbreakable, hide_attributes]
  name: '&7Tool'
  lore:
    - ''
    - '&aUses: {tool_uses}/{tool_max_uses}'
    - '&dCreated by: {player}'
  max-uses: 10
  uses: 10
  on-block-break:
    if: toolHasUsesLeft   # default is 1
    do:
      - consumeToolUses  # default is 1
    else:
      - cancelEvent
      - sendChat &4Your tool is out of uses
  on-left-click: sendChat You left clicked
  on-right-click: sendChat You right clicked
  on-left-click-block: sendChat You left clicked a block
  on-left-click-air: sendChat You left clicked air
  on-right-click-block: sendChat You right clicked a block
  on-right-click-air: sendChat You right clicked air
  on-swap: sendChat You swapped item with offhand
  on-drop:
    if-not: hasFlag confirm_drop
    do:
      - cancelEvent
      - giveTemporaryFlag confirm_drop duration=10
      - sendChat &4Press Q again to drop item

lore_katana:
  type: iron_sword
  lore: [Silken Edge, Threadslicer, Cuts with Precision]

web_cutter:
  type: shears
  name: "&f&lWeb Cutter"

legendary_axe:
  type: gold_axe
  lore: ["&6Legendary"]

generic_pickaxe:
  type: iron_pickaxe
  name: '&7&lGeneric Pickaxe'
  #max-durability: 10   # 1.20.5+

compressed_coal:
  type: coal
  amount: 1
  name: "&8Compressed Coal"
  lore:
    - "&7A dense chunk of coal, ready for use."
  model-data: 1003
  repair-cost: 10
  flags:
    - hide enchants
  unbreakable: false
  enchants:
    smite: 1
  attributes:
    - knockback_resistance 0.2 operation=multiply slot=chest name=stability
  persistent-data:
    - key: orestack:item
      type: string
      value: compressed_coal

iron_chunk:
