#░░░▀▀▀░▀░▀░▀▀▀░▀▀▀░░▀░░▀░▀░▀▀▀░▀░▀░░░▀▀▀░▀▀▀░▀░▀░▀░░░▀▀▀░▀▀▀░░░░

# Whether to automatically add missing options to this config file.
keep-file-up-to-date: true

# Whether to show config errors in chat when a player uses /orestack reload
show-reload-errors: true

# Print the stacktrace of configuration errors for development
debug: false

# Toggle colors in console messages
colored-console: true

#░░░█▀▀░█▀▀░█▀█░█▀▀░█▀▄░█▀█░█░░░░░░
#░░░█░█░█▀▀░█░█░█▀▀░█▀▄░█▀█░█░░░░░░
#░░░▀▀▀░▀▀▀░▀░▀░▀▀▀░▀░▀░▀░▀░▀▀▀░░░░

# Toggle generation of example configurations
generate-examples: true

# Check for plugin updates on startup and reload
check-for-updates: true

# Enable anonymous bStats metrics collection (No performance impact)
metrics: true

# Print the large Orestack logo in the console on startup
dump-logo: true

# Active localization file (e.g., en = languages/en.yml)
language: en

# Generate the language folder and populate with all default translation files
generate-languages: false

# Fallback to default messages silently if translation keys are missing
ignore-missing-translation-errors: false

# Auto-save intervals (0 = save only on shutdown/reload)
auto-save: 0

# Delay before mapping custom worlds (increase if custom worlds aren't detected)
world-load-timeout: 3s

# Period to cache player state and data after they disconnect
player-cache-duration: 30s

# Materials excluded when running /orestack structure save
structure-blacklist:
  - AIR
  - BEDROCK

# If enabled, blocks that were replaced when the generator/gate was placed
# will be restored when the generator/gate is removed.
restore-original-blocks-on-remove: true

# Whether to keep the blocks (max phase) when a generator/gate is removed.
keep-blocks-on-remove: false

# The wand used to select a region (admin tool)
structure-wand:
  material: golden pickaxe
  name: '&6&lOrestack Wand'
  glow: true
  lore:
    - '&fleft-click to select first corner'
    - '&fright-click to select second corner'

#░░░█▄█░█▀█░█▀▄░█░█░█░░░█▀▀░█▀▀░░░░
#░░░█░█░█░█░█░█░█░█░█░░░█▀▀░▀▀█░░░░
#░░░▀░▀░▀▀▀░▀▀░░▀▀▀░▀▀▀░▀▀▀░▀▀▀░░░░
# Modules: items, messages, particles, sounds, menus, recipes, functions, structures,
#          generators, gates, collections, mobs, commands

# Toggle modules that should be disabled. Once a module is disabled you can delete the respective config folder.
disabled-modules: []

#░░░█▀▀░▀█▀░█▀█░▀█▀░█▀▀░░░░
#░░░▀▀█░░█░░█▀█░░█░░▀▀█░░░░
#░░░▀▀▀░░▀░░▀░▀░░▀░░▀▀▀░░░░

# Whether custom stats should be enabled
custom-stats: true

# Whether to use the actionbar to show the status bar
show-status-bar: true

# The status bar to show to the player
status-bar: '&c{player_health}/{player_max_health}❤   &a{player_defense}❈ Defense   &b{player_mana}/{player_max_mana}✎ Mana'

# The base player stats
base-stats:
  damage: 1
  defense: 1
  max-health: 100
  health-regen: 3
  max-mana: 100
  mana-regen: 2

# How long the player remains in combat after fighting another entity.
in-combat-duration: 10-15s

# Whether health should regenerate while in combat
regen-health-during-combat: false

# Whether mana should regenerate while in combat
regen-mana-during-combat: true

#░░░█▀▀░█▀▀░█▀█░█▀▀░█▀▄░█▀█░▀█▀░█▀█░█▀▄░█▀▀░░░░
#░░░█░█░█▀▀░█░█░█▀▀░█▀▄░█▀█░░█░░█░█░█▀▄░▀▀█░░░░
#░░░▀▀▀░▀▀▀░▀░▀░▀▀▀░▀░▀░▀░▀░░▀░░▀▀▀░▀░▀░▀▀▀░░░░

# The default damage to apply to the tool or 0 to disable (Can be overridden inside a generator phase)
default-tool-durability-damage: 1

# The default delay in ticks between each click, it can be overridden in the generator phase.
generator-click-cooldown: 3

# The default delay in ticks between each hit (left-click), it can be overridden in the generator phase.
generator-hit-cooldown: 3

# The default delay in ticks between each harvest attempt (right-click), it can be overridden in the generator phase.
generator-harvest-cooldown: 3

# The generator item used to place and break generators (admin tool)
generator-tool:
  material: terracotta # Replaced by the last phase block
  name: '&b&l{generator_tc} Generator ({generator_tool_rotation_tc})'
  glow: true
  lore:
    - '&fright-click to place'
    - '&fleft-click to break'
    - '&fshift + left-click (air) to rotate'



