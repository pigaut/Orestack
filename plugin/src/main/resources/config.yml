# If enabled, blocks that were replaced when the generator was placed
# will be restored when the generator is removed.
restore-original-blocks-on-remove: true

# Whether to keep the blocks (regrown stage) when a generator is removed.
keep-blocks-on-remove: false

# The default damage to apply to the tool or 0 to disable (Can be overridden inside a generator stage)
default-tool-damage: 1

# The default delay in ticks between each click, it can be overridden in the generator stage.
click-cooldown: 4

# The default delay in ticks between each hit (left-click), it can be overridden in the generator stage.
hit-cooldown: 4

# The default delay in ticks between each harvest attempt (right-click), it can be overridden in the generator stage.
harvest-cooldown: 4

