#░░░░▀░░▀▀▀░▀▀▀░▀░▀░▀░▀░▀▀▀░▀░▀░▀▀▀░▀░▀░░░▀▀▀░▀░▀░▀▀▀░▀░▀░▀░▀░▀░▀░░▀░░░░░
# By placing single-block generators next to each other,
# they can be harvested simultaneously by a tool with the VeinMiner enchant.

# Whether veinminer should be enabled or not
vein-miner: false

# VeinMiner enchant aliases. (Based on the enchantment plugin you use it might be different)
vein-miner-aliases:
  - veinminer
  - vein-miner
  - vein_miner

# Whitelist for single block generators that should work with the veinminer enchantment
vein-generators:
  - coal # Then name of the generator file without '.yml' extension
  - iron
  - gold
  - diamond
  - emerald
# - copper   # 1.17+

# How many blocks are broken based on the enchant level.
vein-size-by-level:
  1: 3
  2: 6
  3: 9
  4: 12
  5: 15

#░░░█▀▀░█░█░█▀█░█▀▀░█▀▄░▀█▀░█▀▀░█▀█░█▀▀░█▀▀░░░█▀▀░█▀█░█▀▀░█░█░█▀█░█▀█░▀█▀░░░░
#░░░█▀▀░▄▀▄░█▀▀░█▀▀░█▀▄░░█░░█▀▀░█░█░█░░░█▀▀░░░█▀▀░█░█░█░░░█▀█░█▀█░█░█░░█░░░░░
#░░░▀▀▀░▀░▀░▀░░░▀▀▀░▀░▀░▀▀▀░▀▀▀░▀░▀░▀▀▀░▀▀▀░░░▀▀▀░▀░▀░▀▀▀░▀░▀░▀░▀░▀░▀░░▀░░░░░
# Compatible actions: giveExp, dropExpAtPlayer, dropExpAtBlock, dropExp.

# Whether experience should be enabled by default when using exp spawn/give actions
# If set to false you will have to manually set the `experience` flag to true in each action
experience: true

# Experience enchant aliases. (Based on the enchantment plugin you use it might be different)
experience-aliases:
  - experience # AdvancedEnchantments, CrazyEnchantments
  - lucky_miner # ExcellentEnchants

# The exp multiplier based on the enchant level
exp-multiplier-by-level:
  1: 1.0-1.2
  2: 1.4
  3: 1.6
  4: 1.8
  5: 2


