# The hologram plugin used to create holograms (DecentHolograms, FancyHolograms)
preferred-hologram-provider: FancyHolograms

# The default hologram view distance, can be overridden inside individual holograms
hologram-view-distance: 15

# Define custom hologram styles and reuse them anywhere. [1.19.4+ only]
hologram-styles:
  default:
    view-distance: 15
    billboard: vertical   # fixed, vertical, horizontal, center
    brightness: 15   # from 0 to 15
    scale: x=1 y=1 z=1
    shadow: strength=1 radius=1
    see-through: false   # [Text-only] See hologram through blocks
    alignment: center   # [Text-only] Text Alignment: center, left, right
#    background-color: { red: 0, green: 0, blue: 0 } # [Text-only] Better system is coming
#    update: 3s   # [Text-only]

