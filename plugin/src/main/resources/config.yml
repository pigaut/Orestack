#░░░▀▀▀░░▀░░▀░▀░▀▀▀░▀▀▀░░▀░░▀▀▀░▀░▀░▀▀▀░░░▀░▀░▀▀▀░▀░▀░▀▀▀░░▀░░▀░▀░░░░
# Compatible actions: damageGenerator, damageGate

# The default damage dealt.
default-damage: 1

# Whether damage exceeding the current phase's health should carry over to the next
overflow-damage: true

# Whether efficiency on a tool increases the damage dealt.
efficiency-damage-multiplier: true

# The damage multiplier based on the efficiency enchant level.
efficiency-damage-multiplier-by-level:
  1: 1.25
  2: 1.3
  3: 1.35
  4: 1.4
  5: 1.45

# Whether to reduce damage if the tool is on cooldown.
reduced-cooldown-damage: true

# The damage amount for a block based on the tool type.
damage-by-tool-type:
  - # ===== Ores =====
    blocks:
      - cobblestone
      - stone
      - coal_ore
      - #- copper_ore   # 1.17+
        iron_ore
      - gold_ore
      - diamond_ore
      - emerald_ore
    tools:
      wooden_pickaxe: 1-3
      stone_pickaxe: 2-4
      iron_axe: 3-5
      gold_axe: 4-6
      diamond_axe: 5-7
      netherite_axe: 6-8
  - # ===== Wood =====
    blocks:
      - oak_log
      - oak_wood
      - spruce_log
      - spruce_wood
      - birch_log
      - birch_wood
      - jungle_log
      - jungle_wood
      - acacia_log
      - acacia_wood
      - dark_oak_log
      - dark_oak_wood
      - crimson_stem
      - crimson_hyphae
      - warped_stem
      - warped_hyphae
    #- mangrove_log    # 1.19+
    #- mangrove_wood   # 1.19+
    #- cherry_log    # 1.20+
    #- cherry_wood   # 1.20+
    #- pale_oak_log    # 1.21+
    #- pale_oak_wood   # 1.21+
    tools:
      air: 1 # use air to set the damage for an empty hand
      wooden_axe: 1-3
      stone_axe: 2-4
      iron_axe: 3-5
      gold_axe: 4-6
      diamond_axe: 5-7
      netherite_axe: 6-8


