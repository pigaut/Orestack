#░░░░░▀▀▀░▀▀▀░▀▀▀░▀▀▀░▀▀▀░▀▀▀░░▀░░▀▀▀░▀▀▀░▀░▀░▀▀▀░░░░

# Item spawn sources that should increment collections
collection-item-sources:
  - action
  - block_drops
  - entity_drops
  - fishing_drops
  - mob_drops
  - generator_drops

# The default collection progress bar for some placeholders
collection-progress-bar: line

#░░░█▄█░█▀█░█▀▄░█▀▀░░░░
#░░░█░█░█░█░█▀▄░▀▀█░░░░
#░░░▀░▀░▀▀▀░▀▀░░▀▀▀░░░░

# Show death messages when a player dies for any reason except being killed by a mob
show-death-messages: true

# Show death messages when a player is slain by a custom mob
show-slain-messages: true

# The default message shown when a player is slain by a custom mob
player-slain-message: '&c{player_tc} was killed by a {mob_name_tc}'

#░░░▀█▀░▀█▀░█▀▀░█▄█░█▀▀░░░░
#░░░░█░░░█░░█▀▀░█░█░▀▀█░░░░
#░░░▀▀▀░░▀░░▀▀▀░▀░▀░▀▀▀░░░░

# The maximum amount of lines the enchants + descriptions should take up
max-enchant-lines: 10

# Settings for the {item_enchants} placeholder
enchant-descriptions:
  # The header/divider/footer before/between/after enchant descriptions
  header: []
  divider:
    - ''
  footer:
    - ''

  # The default enchant description
  default:
    - '&9{enchant_name_tc} {enchant_level_rm}'   # tc: Title Case, rm: IV

  sharpness:
    - '&9Sharpness {enchant_level_rm}'
    - '&7Increases melee damage dealt by &a{item_enchant_damage_%}%'
  efficiency:
    - '&9Efficiency {enchant_level_rm}'
    - '&7Grants &a+{item_enchant_mining_speed} &6⛏ Mining Speed'
  fortune:
    - '&9Fortune {enchant_level_rm}'
    - '&7Grants &a+{item_enchant_mining_fortune} &6☘ Mining Fortune'
  unbreaking:
    - '&9Unbreaking {enchant_level_rm}'
    - '&7Reduces durability loss'

# Reusable lore templates across all your items
lore-templates:
  tool_lore:
    - ''
    - '&7Damage: &c+{item_damage}'
    - '&7Mining Speed: &a+{item_mining_speed}'
    - '&7Mining Fortune: &a+{item_mining_fortune}'
    - ''
    - '{item_enchants}'

