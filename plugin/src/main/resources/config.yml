# Print the stacktrace of configuration errors for development purposes
debug: false

# Whether to show config errors in chat when a player uses /orestack reload
show-reload-errors: true

# Whether to use colors in console messages
colored-console: true

# Generates example files
generate-examples: true

# Checks for available updates on startup and on reload
check-for-updates: true   # Premium required to disable

# Enables bStats metrics collection (https://bstats.org/plugin/bukkit/Orestack/24502)
metrics: true   # Keep this on if you want to support development. (No performance impact)

# Dumps the giant Orestack logo in console on startup and on reload
dump-logo: true   # Premium required to disable

# The language file that should be used (en = en.yml)
language: en

# Whether to ignore missing translation errors from language file and use default values instead
ignore-missing-translation-errors: true

# The auto save timer, if not set or set to 0 data will only be saved on shutdown or on /orestack reload
auto-save: 0

# The time to wait for other plugins to finish loading their worlds after server startup is complete.
# Increase if you notice Orestack is not detecting your custom worlds.
world-load-timeout: 3s

# How long to keep player data after they leave the server.
# Avoids players quitting and joining back to reset their flags.
player-cache-duration: 30s

# Blocks that should be ignored when using /orestack structure save <file-name>
structure-blacklist:
  - AIR
  - BEDROCK

# The wand used to select a region (admin tool)
structure-wand:
  material: golden pickaxe
  name: '&6&lOrestack Wand'
  glow: true
  lore:
    - '&fleft-click to select first corner'
    - '&fright-click to select second corner'

# The generator item used to place and break generators (admin tool)
generator-tool:
  material: terracotta   # Replaced by the last phase block
  name: '&b&l{generator_tc} Generator ({generator_tool_rotation_tc})'
  glow: true
  lore:
    - '&fright-click to place'
    - '&fleft-click to break'
    - '&fshift + left-click (air) to rotate'


