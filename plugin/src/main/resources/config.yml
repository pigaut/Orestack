# Mining Speed is a player stat that increases how fast you break blocks.

# Whether the efficiency enchant should be treated as a stat increment instead of its vanilla functionality
efficiency-enchant-as-stat: true

# Set the Mining Speed amount gained by the items efficiency enchant level.
# [Warning] Works only if 'efficiency-enchant-as-stat' is enabled
mining-speed-by-efficiency-enchant-level:
  1: 20
  2: 40
  3: 60
  4: 80
  5: 100

