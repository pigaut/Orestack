# The default delay in ticks between each click, it can be overridden in each gate phase.
gate-click-cooldown: 3

# The gate item used to place and break gates (admin tool)
gate-tool:
  material: terracotta   # Replaced by the last phase block
  name: '&b&l{gate_tc} Gate ({gate_tool_rotation_tc})'
  glow: true
  lore:
    - '&fright-click to place'
    - '&fleft-click to break'
    - '&fshift + left-click (air) to rotate'

