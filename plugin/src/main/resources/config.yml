# By placing single-block generators next to each other,
# they can be harvested simultaneously by a tool with the VeinMiner enchant.

# Whether veinminer should be enabled or not
vein-miner: false

# VeinMiner enchant aliases. (Based on the enchantment plugin you use it might be different)
vein-miner-aliases:
  - veinminer
  - vein-miner
  - vein_miner

# Whitelist for single block generators that should work with the veinminer enchantment
vein-generators:
  - coal   # Then name of the generator file without '.yml' extension
  - iron
  - gold
  - diamond
  - emerald
#  - copper   # 1.17+

# How many blocks are broken based on the enchant level.
vein-size-by-level:
  1: 3
  2: 6
  3: 9
  4: 12
  5: 15

