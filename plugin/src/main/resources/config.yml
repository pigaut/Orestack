# Damage is a player stat that increases attack damage.

# Whether the sharpness enchant should be treated as a stat multiplier instead of its vanilla functionality
sharpness-enchant-as-stat: true

# The damage multiplier by sharpness enchant level
# [Warning] Works only if 'sharpness-enchant-as-stat' is enabled
damage-multiplier-by-sharpness-enchant-level:
  1: 5%
  2: 10%
  3: 15%
  4: 20%
  5: 30%

