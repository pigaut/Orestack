# Compatible Actions: giveItem, dropItemAtPlayer, dropItemAtBlock, dropItem.

# Whether auto-smelt should be enabled by default when dropping items
# If set to false you will have to manually set the `autoSmelt` flag to true in each action
auto-smelt: true

# AutoSmelt enchant aliases. (Based on the enchantment plugin you use it might be different)
auto-smelt-aliases:
  - autosmelt        # EcoEnchants, CrazyEnchantments
  - infernal_touch   # EcoEnchants
  - auto-smelt
  - smelter          # ExcellentEnchants
  - smelting         # AdvancedEnchantments

# Drops affected by the auto-smelt enchant from the player's tool.
smeltable-items:
  iron_ore: iron_ingot
  gold_ore: gold_ingot
#  raw_iron: iron_ingot   # 1.17+
#  raw_gold: gold_ingot   # 1.17+
#  dirt: diamond          # Supports any item type

# The chance to smelt an item based on the enchant level.
smelt-chance-by-level:
  1: 0.2
  2: 0.4
  3: 0.6
  4: 0.8
  5: 1


