# All unlockable recipes are locked by default, and require use of unlockRecipe and lockRecipe actions,
# but if global is set to true they will be available for all players.

shaped_example:
  type: shaped
  global: false   # Default is false, whether all players should have access to this recipe
  discover-automatically: false   # Default is false, whether players should always see this recipe in their book
  # category: misc   # [1.19.3+] Possible values: misc, equipment, redstone, building
  result: diamond sword   # Supports materials or custom items
  ingredients:
    G: gold ingot
    S: stick
  shape: # 3x3 grid
    - "   " # Empty space for no item
    - " G "
    - " S "

shapeless_example:
  type: shapeless
  result: mushroom stew
  # category: misc   # [1.19.3+] Possible values: misc, equipment, redstone, building
  ingredients:
    - milk bucket
    - cocoa beans
    - sugar

