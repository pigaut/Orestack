--- # ==== Oak Log ===== #
id: a
condition: hasUnlockedCollection oak_log
met:
  type: oak_log
  name: '&eOak Log {oak_log_collection_tier_rm}'
  lore:
    - '&7View all your Oak Log Collection'
    - '&7progress and rewards!'
    -
    - '&7Progress to Oak Log {oak_log_collection_next_tier_rm}: &e{oak_log_collection_progress_percent}&6%'
    - '{oak_log_collection_progress_bar:line} &e{oak_log_collection_progress}/{oak_log_collection_tier_up_requirement}'
    -
    - '&eClick to view!'
  on-left-click:
    - openMenu collection_progress collection=oak_log

unmet:
  type: gray dye
  name: '&cOak Log'
  lore:
    - '&7Find this item to add it to your'
    - '&7collection and unlock collection'
    - '&7rewards!'
  on-left-click:
    - sendChat &4You haven't found this item yet!

